version: '3.8'

services:
  redis:
    image: redis:alpine
    container_name: watch_redis
    ports:
      - "6379:6379"
    restart: always

  n8n:
    image: n8nio/n8n:latest
    container_name: watch_n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
      - WEBHOOK_URL=http://localhost:5678/
    volumes:
      - n8n_data:/home/node/.n8n
    restart: always

volumes:
  n8n_data:
